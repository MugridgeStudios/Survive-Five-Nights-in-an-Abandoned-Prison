<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survive Five Nights in Abandoned Prison</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Survive Five Nights in Abandoned Prison</h1>
<div id="game-container">
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div id="ui">
        <p>Night: <span id="night">1</span></p>
        <p>Health: <span id="health">100</span></p>
        <p>Event: <span id="event">All quiet...</span></p>
        <button id="toggleDoor">Toggle Door</button>
        <button id="toggleLight">Toggle Light</button>
    </div>
</div>
<audio id="jumpscareSound" src="jumpscare.mp3"></audio>
<script src="game.js"></script>
</body>
</html>
