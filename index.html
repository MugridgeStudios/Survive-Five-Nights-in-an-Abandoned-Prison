<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survive Five Nights in Abandoned Prison</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Survive Five Nights in an Abandoned Prison</h1>
    <div id="status">
        <p>Night: <span id="night">1</span></p>
        <p>Health: <span id="health">100</span></p>
        <p>Event: <span id="event">All quiet...</span></p>
    </div>
    <div id="controls">
        <button id="checkDoor">Check Door</button>
        <button id="checkCamera">Check Camera</button>
        <button id="useLight">Turn on Light</button>
    </div>
    <div id="message"></div>
    <script src="game.js"></script>
</body>
</html>
